<?xml version="1.0" encoding="UTF-8"?>
<!--
  Signal K plugin icon for signalk-synthetic-values.

  Family identity (shared across @NearlCrews Signal K plugins): rounded
  square with a deep-ocean gradient and three stacked stylized wave lines.
  Per-project differentiation: a bottom-right circle badge in a
  project-specific colour with a small glyph. This badge is the only
  region that varies between sibling plugins.

  This variant's badge: green (#2E9E5B), unused by the sibling yellow
  (weather), orange (NMEA 2000 emitter), violet (OpenRouter), and crimson
  (Crow's Nest) badges. Glyph: three input dots along the top funnel
  through angled lines into one output dot with a white core, signaling
  several redundant sources combined into one synthetic value. The dots
  and lines are drawn bold so the funnel reads at thumbnail size.
-->
<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 512 512" width="512" height="512" role="img" aria-label="Synthetic Values plugin icon">
  <defs>
    <linearGradient id="bg" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#0E4D6B"/>
      <stop offset="1" stop-color="#1A8DAB"/>
    </linearGradient>
  </defs>

  <!-- Rounded-square background, deep-ocean gradient -->
  <rect width="512" height="512" rx="96" ry="96" fill="url(#bg)"/>

  <!-- Family motif: three stacked wave lines centered in the canvas -->
  <g fill="none" stroke="#FFFFFF" stroke-width="20" stroke-linecap="round" stroke-linejoin="round" opacity="0.94">
    <path d="M 80,176 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,256 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
    <path d="M 80,336 q 44,-36 88,0 t 88,0 t 88,0 t 88,0"/>
  </g>

  <!-- Project badge: bottom-right circle (green for sensor fusion) -->
  <circle cx="388" cy="388" r="84" fill="#2E9E5B" stroke="#FFFFFF" stroke-width="8"/>

  <!-- Badge glyph: three inputs funneling into one output dot -->
  <g fill="none" stroke="#1B3A4B" stroke-width="7" stroke-linecap="round" stroke-linejoin="round">
    <path d="M352,352 L388,404"/>
    <path d="M388,348 L388,404"/>
    <path d="M424,352 L388,404"/>
  </g>
  <g fill="#1B3A4B">
    <circle cx="352" cy="350" r="10"/>
    <circle cx="388" cy="346" r="10"/>
    <circle cx="424" cy="350" r="10"/>
    <circle cx="388" cy="420" r="16"/>
  </g>
  <circle cx="388" cy="420" r="6" fill="#FFFFFF"/>
</svg>
